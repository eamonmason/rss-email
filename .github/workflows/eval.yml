name: Brief Fidelity Eval

# Runs the promptfoo brief-vs-digest fidelity eval. Not part of the per-push merge
# gate: it makes live Claude calls (costs credits), so it runs weekly and on demand.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python library
        run: uv sync --dev

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Install eval dependencies
        # promptfoo lives in its own dependency island (eval/) so it stays out of
        # the CDK/Lambda build's npm tree. See eval/README.md.
        run: npm --prefix eval ci

      - name: Run promptfoo fidelity eval
        working-directory: eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # The eval script sets PROMPTFOO_PYTHON=../.venv/bin/python so the provider
        # runs synthesize() via uv's venv at the repo root.
        # One retry: "Could not extract JSON from llm-rubric response" is a transient
        # promptfoo grader-parse failure unrelated to brief quality.
        run: |
          npm run eval -- --output eval-results.json || {
            echo "First attempt failed; retrying once…"
            npm run eval -- --output eval-results.json
          }

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: brief-eval-results
          path: eval/eval-results.json
          if-no-files-found: warn
