name: Agent Executor

on:
  issue_comment:
    types: [created]

jobs:
  execute:
    runs-on: ubuntu-latest
    if: ${{ !github.event.issue.pull_request && contains(github.event.comment.body, '@agent execute') }}
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Agent Execution
        run: |
          echo "Executing plan for issue #${{ github.event.issue.number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b feature/issue-${{ github.event.issue.number }}
          # The agent (e.g., Claude Code) runs here to generate code.
          # npx @anthropic-ai/claude-code --print 'Implement the plan for issue #${{ github.event.issue.number }}'
          
          # Fallback simulation
          echo "/* Implemented by AI Agent */" >> ai_implemented_${{ github.event.issue.number }}.txt
          
          git add .
          git commit -m "feat: Implement issue #${{ github.event.issue.number }}"
          git push origin feature/issue-${{ github.event.issue.number }}
          gh pr create --title "feat: Implement issue #${{ github.event.issue.number }}" --body "This PR was generated automatically by the Agent Executor based on the approved plan." --base main --head feature/issue-${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
