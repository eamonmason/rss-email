name: Agent Executor

on:
  issue_comment:
    types: [created]

jobs:
  execute:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ !github.event.issue.pull_request && contains(github.event.comment.body, '@agent execute') }}
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Agent Execution
        run: |
          echo "Executing plan for issue #${{ github.event.issue.number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b feature/issue-${{ github.event.issue.number }}
          
          npx @anthropic-ai/claude-code --bare -p "Implement the approved plan for issue #${{ github.event.issue.number }}: '${{ github.event.issue.title }}'. Use available tools to write code and tests. Verify your changes." --allowedTools "Bash,Edit,Read"
          
          git add .
          git commit -m "feat: Implement issue #${{ github.event.issue.number }}"
          git push origin feature/issue-${{ github.event.issue.number }}
          gh pr create --title "feat: Implement issue #${{ github.event.issue.number }}" --body "This PR was generated automatically by the Agent Executor based on the approved plan." --base main --head feature/issue-${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_NO_FLICKER: 1
