name: Agent Planner

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ !github.event.issue.pull_request && github.actor != 'github-actions[bot]' && !contains(github.event.comment.body, '@agent execute') }}
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Agentic Planning
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          CLAUDE_CODE_NO_FLICKER: 1
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "Error: ANTHROPIC_API_KEY is empty."
            exit 1
          fi
          PLAN=$(npx @anthropic-ai/claude-code --bare -p "Analyze this issue: '$ISSUE_TITLE'. Content: '$ISSUE_BODY'. Propose a concise implementation plan. Mention that the user should reply with '@agent execute' to start." --allowedTools "Read")
          gh issue comment ${{ github.event.issue.number }} --body "🤖 **Agent Planner:** $PLAN"
