name: Agent Planner

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  plan:
    runs-on: ubuntu-latest
    if: ${{ !github.event.issue.pull_request && github.actor != 'github-actions[bot]' && !contains(github.event.comment.body, '@agent execute') }}
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Agentic Planning
        # This step uses Claude Code to analyze the issue and propose a plan.
        run: |
          PLAN=$(npx @anthropic-ai/claude-code --bare -p "Analyze this issue: '${{ github.event.issue.title }}'. Content: '${{ github.event.issue.body }}'. Propose a concise implementation plan. Mention that the user should reply with '@agent execute' to start." --allowedTools "Read")
          gh issue comment ${{ github.event.issue.number }} --body "🤖 **Agent Planner:** $PLAN"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_NO_FLICKER: 1
