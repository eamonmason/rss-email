name: Agent Planner

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  plan:
    runs-on: ubuntu-latest
    if: ${{ !github.event.issue.pull_request && github.actor != 'github-actions[bot]' && !contains(github.event.comment.body, '@agent execute') }}
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Agentic Planning
        # This step uses Claude Code or Gemini CLI to analyze the issue and propose a plan.
        # In a real setup, you would pass the context to the CLI.
        run: |
          echo "Agent received issue context."
          echo "You can use Claude Code here via: npx @anthropic-ai/claude-code --print 'Analyze this issue: ${{ github.event.issue.title }} and create a plan.'"
          # For now, we simulate the agent interaction in the workflow.
          gh issue comment ${{ github.event.issue.number }} --body "🤖 **Agent Planner:** I have analyzed this issue. Please review my proposed plan. If it looks good, reply with \`@agent execute\` to begin implementation."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
